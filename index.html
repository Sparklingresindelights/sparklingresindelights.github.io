<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparkling Resin Delights</title>
    <!-- Google Fonts for a High-End Look -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fcfbfa; 
            --primary-dark: #2f3e46;
            --sage-accent: #8fa187;
            --sage-hover: #72846b;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color); 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Minimalist Top Navigation Menu */
        nav {
            background-color: #ffffff;
            padding: 20px 15px;
            text-align: center;
            border-bottom: 1px solid #eae6e1;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav a {
            color: var(--primary-dark);
            margin: 0 18px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        nav a:hover {
            color: var(--sage-accent);
        }

        /* Elegant Editorial Header */
        header {
            background-color: #f3f5f2; 
            color: var(--primary-dark);
            padding: 90px 20px;
            text-align: center;
            border-bottom: 1px solid #eae6e1;
        }
        header h1 {
            margin: 0;
            font-size: 3.5rem;
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            letter-spacing: -0.5px;
        }
        .top-stars {
            color: #d4a373; 
            font-size: 1.1rem;
            margin: 15px 0;
            letter-spacing: 6px;
        }
        header p {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin: 10px 0 0 0;
            font-style: italic;
            color: var(--text-muted);
        }

        .container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 30px;
        }

        .shop-intro {
            text-align: center;
            margin-bottom: 70px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .shop-intro h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--primary-dark);
            margin-bottom: 20px;
        }
        .shop-intro p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* High-End Dynamic Photo Grid Layout */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-bottom: 90px;
        }
        .product-card {
            background: #ffffff;
            border-radius: 4px;
            overflow: hidden;
            text-align: left; 
            padding-bottom: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none; 
            display: block;
        }
        .product-card:nth-child(even) {
            transform: translateY(25px);
        }
        .img-container {
            width: 100%;
            height: 340px;
            overflow: hidden;
            background-color: #f8fafc;
            border-radius: 4px;
        }
        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .product-card:hover img {
            transform: scale(1.04);
        }
        .product-card h3 {
            margin: 20px 0 6px 0;
            color: var(--primary-dark);
            font-size: 1.25rem;
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }
        .product-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.6;
            font-weight: 300;
        }

        /* Chic Minimal Testimonial Section */
        .review-section {
            background-color: #f3f5f2;
            padding: 80px 30px;
            border-radius: 4px;
            margin-top: 120px;
            text-align: center;
        }
        .review-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 40px;
            color: var(--primary-dark);
        }
        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .review-card {
            background: #ffffff;
            padding: 35px;
            border-radius: 4px;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.01);
        }
        .card-stars {
            color: #d4a373;
            font-size: 1rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .review-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 1.05rem;
            color: var(--text-main);
        }
        .review-author {
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        /* Clean & Modern Feedback Entry Form */
        .feedback-form-container {
            max-width: 460px;
            margin: 80px auto 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 4px;
            border: 1px solid #eae6e1;
            text-align: left;
        }
        .feedback-form-container h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            color: var(--primary-dark);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .feedback-form-container label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-dark);
        }
        .feedback-form-container input[type="text"], 
        .feedback-form-container select, 
        .feedback-form-container textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #dcd7d0;
            border-radius: 2px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
            background-color: #faf9f6;
            transition: all 0.2s;
        }
        .feedback-form-container textarea {
            resize: vertical;
            min-height: 100px;
        }
        .feedback-form-container input:focus,
        .feedback-form-container select:focus,
        .feedback-form-container textarea:focus {
            outline: none;
            border-color: var(--sage-accent);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(143, 161, 135, 0.15);
        }
        .submit-btn {
            display: block;
            width: 100%;
            background-color: var(--primary-dark);
            color: #ffffff;
            padding: 16px;
            border: none;
            border-radius: 2px;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background-color: var(--sage-accent);
        }

        /* Footer styling */
        footer {
            text-align: center;
            padding: 60px 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            border-top: 1px solid #eae6e1;
            margin-top: 100px;
        }

        @media (max-width: 992px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 40px 25px;
            }
            .product-card:nth-child(even) {
                transform: none; 
            }
            header h1 {
                font-size: 2.6rem;
            }
        }
        @media (max-width: 576px) {
            .product-grid {
                grid-template-columns: 1fr;
                gap: 45px;
            }
            .container {
                margin: 50px auto;
                padding: 0 20px;
            }
            nav a {
                display: inline-block;
                margin: 5px 10px;
            }
        }
    </style>
</head>
